services:
  postgres:
    image: postgres:16-alpine
    container_name: web-page-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: web_page
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 842611
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
